<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>CableSetGo — Login / Register</title>
		<link rel="stylesheet" href="assets/css/styles.css" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
	</head>
	<body data-page="auth">
		<header class="csg-header">
			<div class="csg-container csg-header-inner">
				<a href="index.html">CableSetGo</a>
				<nav class="csg-nav">
					<a href="index.html" data-i18n="nav.home">Home</a>
				</nav>
				<div class="csg-lang">
					<label for="lang-select" data-i18n="nav.language">Language</label>
					<select id="lang-select">
						<option value="en">English</option>
						<option value="hi">हिन्दी</option>
						<option value="bn">বাংলা</option>
					</select>
				</div>
			</div>
		</header>

		<main class="csg-container csg-auth">
			<div class="csg-card csg-auth-card">
				<h2 data-i18n="auth.title">Sign in or create account</h2>
				<form id="phone-form">
					<label for="dial" data-i18n="auth.countryCode">Country code</label>
					<input id="dial" name="dial" value="+91" inputmode="tel" autocomplete="tel-country-code" />

					<label for="phone" data-i18n="auth.phone">Phone number</label>
					<input id="phone" name="phone" placeholder="9876543210" inputmode="tel" autocomplete="tel-national" maxlength="15" />

					<button type="submit" class="csg-btn csg-btn-primary" data-i18n="auth.sendOtp">Send OTP</button>
				</form>

				<form id="otp-form" class="csg-hide">
					<label for="otp" data-i18n="auth.otp">Enter OTP</label>
					<input id="otp" name="otp" placeholder="123456" inputmode="numeric" maxlength="8" />

					<button type="submit" class="csg-btn csg-btn-primary" data-i18n="auth.verifyOtp">Verify</button>
					<button id="resend-otp" type="button" class="csg-btn csg-btn-link" data-i18n="auth.resend">Resend OTP</button>
				</form>

				<p id="auth-status" class="csg-status"></p>
			</div>
		</main>

		<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
		<script src="assets/js/sysenv.js"></script>
		<script src="assets/js/supabaseClient.js"></script>
		<script src="assets/js/app.js"></script>
		<script src="assets/js/auth.js"></script>
	</body>
	</html>
