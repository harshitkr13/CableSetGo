<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>CableSetGo — Complaints & Feedback</title>
		<link rel="stylesheet" href="assets/css/styles.css" />
	</head>
	<body data-page="complaints">
		<header class="csg-header">
			<div class="csg-container csg-header-inner">
				<a class="csg-brand" href="index.html">CableSetGo</a>
				<nav class="csg-nav">
					<a href="landing.html" data-i18n="nav.providers">Providers</a>
					<a href="profile.html" data-i18n="nav.profile">Profile</a>
				</nav>
				<div class="csg-lang">
					<label for="lang-select" data-i18n="nav.language">Language</label>
					<select id="lang-select">
						<option value="en">English</option>
						<option value="hi">हिन्दी</option>
						<option value="bn">বাংলা</option>
					</select>
				</div>
			</div>
		</header>

		<main class="csg-container csg-form">
			<div class="csg-card">
				<h2 data-i18n="complaints.title">Complaint or Feedback</h2>
				<form id="complaint-form">
					<label for="email">Email</label>
					<input id="email" name="email" placeholder="name@example.com" />

					<label for="type" data-i18n="complaints.type">Type</label>
					<select id="type" name="type">
						<option value="complaint" data-i18n="complaints.typeComplaint">Complaint</option>
						<option value="feedback" data-i18n="complaints.typeFeedback">Feedback</option>
					</select>

					<label for="subject" data-i18n="complaints.subject">Subject</label>
					<input id="subject" name="subject" />

					<label for="message" data-i18n="complaints.message">Message</label>
					<textarea id="message" name="message"></textarea>

					<button class="csg-btn csg-btn-primary" type="submit" data-i18n="complaints.submit">Submit</button>
				</form>
				<p id="complaint-status" class="csg-status"></p>
			</div>
		</main>

		<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
		<script src="assets/js/sysenv.js"></script>
		<script src="assets/js/supabaseClient.js"></script>
		<script src="assets/js/app.js"></script>
		<script src="assets/js/complaints.js"></script>
	</body>
	</html>
